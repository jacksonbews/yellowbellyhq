<!-- ============ LOGIN SCREEN ============ -->
<div id="login-screen" class="login-screen hidden">
  <div class="login-card">
    <div class="login-logo"><svg class="logo-svg" role="img" aria-label="Yellowbelly"><use href="#yb-logo"/></svg><span class="hl">( HQ )</span></div>
    <p class="login-sub">Internal team dashboard — tasks, docs &amp; people.</p>
    <button id="btn-google-signin" class="btn btn-primary btn-lg">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M21.35 11.1H12v2.9h5.35c-.5 2.4-2.6 3.9-5.35 3.9a6 6 0 1 1 0-12c1.5 0 2.85.55 3.9 1.45l2.15-2.15A9 9 0 1 0 12 21c5.2 0 8.85-3.65 8.85-8.8 0-.4-.05-.75-.1-1.1z"/></svg>
      Sign in with Google
    </button>
    <p id="login-error" class="login-error hidden"></p>
    <p class="login-note">Access is limited to the Yellowbelly team.</p>
  </div>
</div>

<!-- ============ ACCESS DENIED ============ -->
<div id="denied-screen" class="login-screen hidden">
  <div class="login-card">
    <div class="login-logo"><svg class="logo-svg" role="img" aria-label="Yellowbelly"><use href="#yb-logo"/></svg><span class="hl">( HQ )</span></div>
    <p class="login-sub">This Google account isn't on the team list yet.</p>
    <p class="login-note" id="denied-email"></p>
    <p class="login-note">Ask Nikki or a founder to add your email on the Team page, then sign in again.</p>
    <button id="btn-denied-signout" class="btn btn-ghost">Try a different account</button>
  </div>
</div>

<!-- ============ APP SHELL ============ -->
<div id="app" class="app hidden">

        <select id="demo-user-select"></select>
      </div>
      <div class="bell-wrap">
        <button id="btn-bell" class="icon-btn" title="Notifications" aria-label="Notifications">

            <span>Notifications</span>
            <button id="btn-mark-all-read" class="link-btn">Mark all read</button>
          </div>
          <div id="notif-list" class="notif-list"></div>
        </div>
      </div>
      <button id="btn-me" class="me-btn" title="My profile"></button>
    </div>
  </header>

  <main id="main" class="main"></main>
